[run]
seed = 100

[dataset]
dir = "datasets/original"
expt = "monkey_1_set_1"
format = "npy" 

[feedback]
error = 0
sparse_rate = 0

[banditron] #banditron(X, y, error, sparse_rate, k, gamma)
gamma = 0.001
eta = 0.5

[banditronRP] #banditronRP(X, y, error, sparse_rate, k, gamma)
k = 128
gamma = 0.001
eta = 0.5

[HRL]
muH = 0.01
muO = 0.01
num_nodes = [96,2]

[AGREL] #AGREL(X, y, error, sparse_rate, gamma, alpha, beta, num_nodes)
gamma = 0.01
alpha = 0.1
beta = 0.1
num_nodes = [96, 3, 2]

[dqn] #DQN(X,Y,error,sparsity_rate,epsilon,gamma)
epsilon = 0.01
gamma = 0.1

[qlgbm] #QLGBM(X,Y,error,sparsity_rate,epsilon,gamma)
epsilon = 0.01
gamma = 0.1